name: CI

# Run on every push to main and on every pull request targeting it.
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# A newer push to the same branch/PR cancels in-flight runs.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Mirrors `requires-python = ">=3.10"` in pyproject.toml.
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install cargodash + dev dependencies
        run: |
          python -m pip install --upgrade pip
          # [dev] pulls in pytest; the package itself pulls in pyarrow.
          pip install -e ".[dev]"

      - name: Run test suite
        run: pytest -v

      # Safety net: the tests also run under the stdlib runner with no
      # extra deps, so a broken pytest setup can't silently skip them.
      - name: Run test suite (stdlib unittest fallback)
        run: python -m unittest discover -s tests -v
